spring:
    application:
        name: X3_Links
    config:
        import:
            - optional:file:.env[.properties]
        activate:
            on-profile: default
    neo4j:
        uri: bolt://${NEO4J_HOST}:${NEO4J_PORT}
        authentication:
            username: ${NEO4J_USERNAME}
            password: ${NEO4J_PASSWORD}

server:
    port: ${PORT}
    gateway: ${GATEWAY}

logging:
    level:
        org.springframework: INFO
        com.unknown.link: TRACE
    file:
        name: src/main/resources/logging/user-ms.log
    logback:
        rollingpolicy:
            max-file-size: 10MB
            max-history: 10

springdoc:
    swagger-ui:
        enabled: true
        path: /link/swagger.html
    api-docs:
        path: /link/v3/api-docs/swagger-config
